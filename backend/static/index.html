<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="icon" type="image/svg+xml" href="data:image/svg+xml,<svg xmlns=%22http://www.w3.org/2000/svg%22 viewBox=%220 0 100 100%22><text y=%22.9em%22 font-size=%2290%22>🛡️</text></svg>" />
    <title>Hệ thống Giám sát An toàn Lao động | Smart Safety Dashboard</title>
    
    <!-- Google Fonts (Inter) -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    
    <!-- CDNs: TailwindCSS, React 17, Babel từ Cloudflare (Cực kỳ nhanh và ổn định tại Việt Nam) -->
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    fontFamily: {
                        sans: ['Inter', 'sans-serif'],
                    },
                    colors: {
                        slate: {
                            950: '#020617',
                        }
                    }
                }
            }
        }
    </script>
    
    <!-- React 17 & Babel (cdnjs.cloudflare.com) -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/react/17.0.2/umd/react.production.min.js" crossorigin="anonymous"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/react-dom/17.0.2/umd/react-dom.production.min.js" crossorigin="anonymous"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/babel-standalone/7.22.20/babel.min.js" crossorigin="anonymous"></script>

    <style>
        /* Glassmorphism custom card class */
        .glass-card {
            background: rgba(15, 23, 42, 0.45);
            backdrop-filter: blur(16px);
            -webkit-backdrop-filter: blur(16px);
            border: 1px solid rgba(255, 255, 255, 0.05);
            box-shadow: 0 8px 32px 0 rgba(0, 0, 0, 0.37);
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
        }
        .glass-card:hover {
            border-color: rgba(255, 255, 255, 0.1);
            box-shadow: 0 12px 40px 0 rgba(0, 0, 0, 0.5);
            transform: translateY(-2px);
        }
        /* Custom scrollbar */
        ::-webkit-scrollbar {
            width: 6px;
            height: 6px;
        }
        ::-webkit-scrollbar-track {
            background: rgba(2, 6, 23, 0.5);
        }
        ::-webkit-scrollbar-thumb {
            background: rgba(255, 255, 255, 0.1);
            border-radius: 4px;
        }
        ::-webkit-scrollbar-thumb:hover {
            background: #f97316;
        }
        /* Camera overlay scanline */
        .scanlines::before {
            content: " ";
            display: block;
            position: absolute;
            top: 0; left: 0; bottom: 0; right: 0;
            background: linear-gradient(rgba(18, 16, 16, 0) 50%, rgba(0, 0, 0, 0.25) 50%), linear-gradient(90deg, rgba(255, 0, 0, 0.06), rgba(0, 255, 0, 0.02), rgba(0, 0, 255, 0.06));
            z-index: 2;
            background-size: 100% 3px, 6px 100%;
            pointer-events: none;
            opacity: 0.15;
        }
    </style>
</head>
<body class="bg-slate-950 text-slate-100 min-h-screen flex flex-col justify-between selection:bg-orange-500/30 selection:text-white">
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useEffect, useRef } = React;

        // Custom Icon helper using native SVG paths to avoid external library crashes
        const Icon = ({ name, size = 20, className = "" }) => {
            const icons = {
                Shield: (
                    <svg xmlns="http://www.w3.org/2000/svg" width={size} height={size} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className={className}>
                        <path d="M20 13c0 5-3.5 7.5-7.66 9.7a1 1 0 0 1-.68 0C7.5 20.5 4 18 4 13V6a1 1 0 0 1 .76-.97l8-2a1 1 0 0 1 .48 0l8 2A1 1 0 0 1 20 6z"/>
                    </svg>
                ),
                ShieldCheck: (
                    <svg xmlns="http://www.w3.org/2000/svg" width={size} height={size} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className={className}>
                        <path d="M20 13c0 5-3.5 7.5-7.66 9.7a1 1 0 0 1-.68 0C7.5 20.5 4 18 4 13V6a1 1 0 0 1 .76-.97l8-2a1 1 0 0 1 .48 0l8 2A1 1 0 0 1 20 6z"/>
                        <path d="m9 12 2 2 4-4"/>
                    </svg>
                ),
                ShieldAlert: (
                    <svg xmlns="http://www.w3.org/2000/svg" width={size} height={size} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className={className}>
                        <path d="M20 13c0 5-3.5 7.5-7.66 9.7a1 1 0 0 1-.68 0C7.5 20.5 4 18 4 13V6a1 1 0 0 1 .76-.97l8-2a1 1 0 0 1 .48 0l8 2A1 1 0 0 1 20 6z"/>
                        <line x1="12" x2="12" y1="9" y2="13"/>
                        <line x1="12" x2="12.01" y1="17" y2="17"/>
                    </svg>
                ),
                Users: (
                    <svg xmlns="http://www.w3.org/2000/svg" width={size} height={size} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className={className}>
                        <path d="M16 21v-2a4 4 0 0 0-4-4H6a4 4 0 0 0-4 4v2"/>
                        <circle cx="9" cy="7" r="4"/>
                        <path d="M22 21v-2a4 4 0 0 0-3-3.87"/>
                        <path d="M16 3.13a4 4 0 0 1 0 7.75"/>
                    </svg>
                ),
                CheckSquare: (
                    <svg xmlns="http://www.w3.org/2000/svg" width={size} height={size} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className={className}>
                        <path d="m9 11 3 3L22 4"/>
                        <path d="M21 12v7a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h11"/>
                    </svg>
                ),
                RefreshCw: (
                    <svg xmlns="http://www.w3.org/2000/svg" width={size} height={size} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className={className}>
                        <path d="M21 12a9 9 0 0 0-9-9 9.75 9.75 0 0 0-6.74 2.74L3 8"/>
                        <path d="M3 3v5h5"/>
                        <path d="M3 12a9 9 0 0 0 9 9 9.75 9.75 0 0 0 6.74-2.74L21 16"/>
                        <path d="M16 16h5v5"/>
                    </svg>
                ),
                Eye: (
                    <svg xmlns="http://www.w3.org/2000/svg" width={size} height={size} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className={className}>
                        <path d="M2.062 12.348a1 1 0 0 1 0-.696 10.75 10.75 0 0 1 19.876 0 1 1 0 0 1 0 .696 10.75 10.75 0 0 1-19.876 0z"/>
                        <circle cx="12" cy="12" r="3"/>
                    </svg>
                ),
                X: (
                    <svg xmlns="http://www.w3.org/2000/svg" width={size} height={size} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className={className}>
                        <path d="M18 6 6 18"/>
                        <path d="m6 6 12 12"/>
                    </svg>
                ),
                AlertTriangle: (
                    <svg xmlns="http://www.w3.org/2000/svg" width={size} height={size} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className={className}>
                        <path d="m21.73 18-8-14a2 2 0 0 0-3.48 0l-8 14A2 2 0 0 0 4 21h16a2 2 0 0 0 1.73-3Z"/>
                        <line x1="12" x2="12" y1="9" y2="13"/>
                        <line x1="12" x2="12.01" y1="17" y2="17"/>
                    </svg>
                ),
                CheckCircle: (
                    <svg xmlns="http://www.w3.org/2000/svg" width={size} height={size} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className={className}>
                        <path d="M22 11.08V12a10 10 0 1 1-5.93-9.14"/>
                        <path d="m9 11 3 3L22 4"/>
                    </svg>
                ),
                Clock: (
                    <svg xmlns="http://www.w3.org/2000/svg" width={size} height={size} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className={className}>
                        <circle cx="12" cy="12" r="10"/>
                        <polyline points="12 6 12 12 16 14"/>
                    </svg>
                ),
                Check: (
                    <svg xmlns="http://www.w3.org/2000/svg" width={size} height={size} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className={className}>
                        <polyline points="20 6 9 17 4 12"/>
                    </svg>
                ),
                MessageSquare: (
                    <svg xmlns="http://www.w3.org/2000/svg" width={size} height={size} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className={className}>
                        <path d="M21 15a2 2 0 0 1-2 2H7l-4 4V5a2 2 0 0 1 2-2h14a2 2 0 0 1 2 2z"/>
                    </svg>
                )
            };
            return icons[name] || icons.Shield;
        };

        const App = () => {
            const [violations, setViolations] = useState([]);
            const [statistics, setStatistics] = useState({
                cards: { totalViolations: 0, unresolvedCount: 0, resolvedCount: 0, resolutionRate: 100, complianceRate: 94.2, activeWorkers: 3 },
                typeDistribution: [
                    { name: "Thiếu mũ bảo hộ", value: 0, color: "#f59e0b" },
                    { name: "Thiếu áo phản quang", value: 0, color: "#3b82f6" },
                    { name: "Thiếu cả hai", value: 0, color: "#ef4444" }
                ],
                hourlyTrend: []
            });
            const [backendConnected, setBackendConnected] = useState(true);
            const [selectedViolation, setSelectedViolation] = useState(null);
            const [resolutionNotes, setResolutionNotes] = useState('');
            const [fps, setFps] = useState(25);
            const [camTimestamp, setCamTimestamp] = useState('');
            const prevUnresolvedCount = useRef(0);

            // Fetch data
            const fetchData = async () => {
                try {
                    const resLogs = await fetch('/api/violations');
                    const dataLogs = await resLogs.json();
                    setViolations(dataLogs);

                    const resStats = await fetch('/api/statistics');
                    const dataStats = await resStats.json();
                    setStatistics(dataStats);
                    
                    setBackendConnected(true);

                    // TTS Voice Alert
                    const currentUnresolved = dataStats.cards.unresolvedCount;
                    if (currentUnresolved > prevUnresolvedCount.current) {
                        triggerVoiceAlert();
                    }
                    prevUnresolvedCount.current = currentUnresolved;
                } catch (e) {
                    console.error(e);
                    setBackendConnected(false);
                }
            };

            const triggerVoiceAlert = () => {
                if ('speechSynthesis' in window) {
                    window.speechSynthesis.cancel();
                    const utterance = new SpeechSynthesisUtterance("Cảnh báo! Phát hiện lỗi vi phạm bảo hộ tại công trường!");
                    utterance.lang = 'vi-VN';
                    utterance.rate = 0.95;
                    window.speechSynthesis.speak(utterance);
                }
            };

            useEffect(() => {
                fetchData();
                const interval = setInterval(fetchData, 4000);
                
                const timeInterval = setInterval(() => {
                    setCamTimestamp(new Date().toLocaleString('vi-VN'));
                }, 1000);

                const fpsInterval = setInterval(() => {
                    setFps(Math.floor(23 + Math.random() * 3));
                }, 1500);

                return () => {
                    clearInterval(interval);
                    clearInterval(timeInterval);
                    clearInterval(fpsInterval);
                };
            }, []);

            const handleResolve = async (id, notes = '') => {
                try {
                    const res = await fetch(`/api/violations/${id}/resolve?notes=${encodeURIComponent(notes)}`, {
                        method: 'PUT'
                    });
                    if (res.ok) {
                        setViolations(prev => 
                            prev.map(v => v.id === id ? { ...v, status: 'Resolved', notes: notes || v.notes } : v)
                        );
                        fetchData();
                        setSelectedViolation(null);
                    }
                } catch (e) {
                    console.error(e);
                }
            };

            const formatTime = (isoString) => {
                const date = new Date(isoString);
                return date.toLocaleTimeString('vi-VN', { hour: '2-digit', minute: '2-digit', second: '2-digit' }) + 
                       ' ' + date.toLocaleDateString('vi-VN', { day: '2-digit', month: '2-digit' });
            };

            return (
                <div className="min-h-screen flex flex-col justify-between bg-slate-950">
                    {/* Header */}
                    <header className="sticky top-0 z-40 bg-slate-950/80 backdrop-blur-md border-b border-white/5 py-4 px-6 md:px-10 flex flex-col sm:flex-row gap-4 items-center justify-between shadow-lg shadow-black/20">
                        <div className="flex items-center gap-3">
                            <div className="p-2 rounded-xl bg-orange-500/10 border border-orange-500/20 text-orange-500">
                                <Icon name="Shield" size={24} className="animate-pulse text-orange-500" />
                            </div>
                            <div className="flex flex-col text-center sm:text-left">
                                <h1 className="text-base md:text-lg font-extrabold tracking-wider bg-gradient-to-r from-orange-400 via-amber-400 to-yellow-300 bg-clip-text text-transparent">
                                    HỆ THỐNG GIÁM SÁT AN TOÀN LAO ĐỘNG
                                </h1>
                                <span className="text-[10px] text-slate-400 tracking-widest font-semibold uppercase mt-0.5">
                                    CÔNG NGHỆ NHẬN DIỆN HỌC SÂU THỜI GIAN THỰC (FASTAPI-STATIC)
                                </span>
                            </div>
                        </div>

                        <div className="flex items-center gap-4">
                            <div className="flex items-center gap-2">
                                <span className={`h-2.5 w-2.5 rounded-full ${backendConnected ? 'bg-emerald-500 animate-pulse' : 'bg-red-500'}`} />
                                <span className="text-xs font-semibold text-slate-400">
                                    {backendConnected ? 'MÁY CHỦ HOẠT ĐỘNG' : 'MẤT KẾT NỐI MÁY CHỦ'}
                                </span>
                            </div>
                            <button 
                                onClick={fetchData}
                                className="flex items-center gap-1.5 px-3 py-1.5 bg-white/5 border border-white/10 hover:bg-white/10 text-slate-300 rounded-lg text-xs font-medium transition-all"
                            >
                                <Icon name="RefreshCw" size={12} className="text-slate-300" />
                                <span>Đồng bộ</span>
                            </button>
                        </div>
                    </header>

                    {/* Main Content */}
                    <main className="flex-1 p-6 md:p-8 max-w-7xl w-full mx-auto flex flex-col gap-6">
                        {/* KPIs */}
                        <section className="grid grid-cols-2 lg:grid-cols-4 gap-4">
                            <div className="glass-card p-5 flex items-center justify-between">
                                <div>
                                    <span className="text-[10px] text-slate-400 font-bold uppercase tracking-wider">Tỷ lệ tuân thủ</span>
                                    <h2 className="text-2xl md:text-3xl font-extrabold text-emerald-400 font-mono mt-1">{statistics.cards.complianceRate}%</h2>
                                </div>
                                <div className="p-3 bg-emerald-500/10 border border-emerald-500/20 text-emerald-400 rounded-xl">
                                    <Icon name="ShieldCheck" className="text-emerald-400" />
                                </div>
                            </div>
                            <div className="glass-card p-5 flex items-center justify-between">
                                <div>
                                    <span className="text-[10px] text-slate-400 font-bold uppercase tracking-wider">Cảnh báo chưa xử lý</span>
                                    <h2 className={`text-2xl md:text-3xl font-extrabold font-mono mt-1 ${statistics.cards.unresolvedCount > 0 ? 'text-rose-400 animate-pulse' : 'text-slate-400'}`}>
                                        {statistics.cards.unresolvedCount}
                                    </h2>
                                </div>
                                <div className={`p-3 rounded-xl border ${statistics.cards.unresolvedCount > 0 ? 'bg-rose-500/10 border-rose-500/20 text-rose-400' : 'bg-white/5 border-white/10 text-slate-400'}`}>
                                    <Icon name="ShieldAlert" className={statistics.cards.unresolvedCount > 0 ? "text-rose-400" : "text-slate-400"} />
                                </div>
                            </div>
                            <div className="glass-card p-5 flex items-center justify-between">
                                <div>
                                    <span className="text-[10px] text-slate-400 font-bold uppercase tracking-wider">Công nhân giám sát</span>
                                    <h2 className="text-2xl md:text-3xl font-extrabold text-sky-400 font-mono mt-1">{statistics.cards.activeWorkers}</h2>
                                </div>
                                <div className="p-3 bg-sky-500/10 border border-sky-500/20 text-sky-400 rounded-xl">
                                    <Icon name="Users" className="text-sky-400" />
                                </div>
                            </div>
                            <div className="glass-card p-5 flex items-center justify-between">
                                <div>
                                    <span className="text-[10px] text-slate-400 font-bold uppercase tracking-wider">Giải quyết lỗi</span>
                                    <h2 className="text-2xl md:text-3xl font-extrabold text-violet-400 font-mono mt-1">{statistics.cards.resolutionRate}%</h2>
                                </div>
                                <div className="p-3 bg-violet-500/10 border border-violet-500/20 text-violet-400 rounded-xl">
                                    <Icon name="CheckSquare" className="text-violet-400" />
                                </div>
                            </div>
                        </section>

                        {/* Stream and Table */}
                        <section className="grid grid-cols-1 lg:grid-cols-12 gap-6 items-stretch">
                            {/* Video Stream */}
                            <div className="lg:col-span-5 flex flex-col">
                                <div className="glass-card overflow-hidden relative">
                                    <div className="flex items-center justify-between px-4 py-3 bg-slate-900/60 border-b border-white/5">
                                        <div className="flex items-center gap-2">
                                            <span className="relative flex h-2 w-2">
                                                <span className="animate-ping absolute inline-flex h-full w-full rounded-full bg-red-400 opacity-75"></span>
                                                <span className="relative inline-flex rounded-full h-2 w-2 bg-red-500"></span>
                                            </span>
                                            <span className="font-semibold text-slate-200 text-xs">CAMERA 01 - NORTH ZONE</span>
                                        </div>
                                        <span className="px-2 py-0.5 rounded bg-orange-500/10 text-orange-400 text-[10px] font-bold border border-orange-500/20 animate-pulse">LIVE</span>
                                    </div>
                                    <div className="relative aspect-video bg-slate-950 flex items-center justify-center scanlines">
                                        <img src="/api/stream" className="w-full h-full object-cover" onError={(e) => { e.target.src='data:image/svg+xml,<svg xmlns=%22http://www.w3.org/2000/svg%22 width=%22100%22 height=%2260%22><rect width=%22100%22 height=%2260%22 fill=%22%23020617%22/><text x=%2250%25%22 y=%2250%25%22 dominant-baseline=%22middle%22 text-anchor=%22middle%22 fill=%22%23f43f5e%22 font-size=%225%22 font-family=%22sans-serif%22>MẤT KẾT NỐI CAMERA</text></svg>' }} />
                                        <div className="absolute inset-0 pointer-events-none flex flex-col justify-between p-3 font-mono text-[9px] text-emerald-400 tracking-wider">
                                            <div className="flex justify-between w-full">
                                                <span className="text-red-500 animate-pulse font-bold">● REC</span>
                                                <span>1080P FHD</span>
                                            </div>
                                            <div className="flex justify-between w-full items-end">
                                                <span>AI DETECT: {statistics.cards.activeWorkers} WORKERS</span>
                                                <span>{camTimestamp}</span>
                                            </div>
                                        </div>
                                    </div>
                                </div>
                            </div>

                            {/* Log Table */}
                            <div className="lg:col-span-7 flex flex-col">
                                <div className="glass-card flex flex-col h-full">
                                    <div className="flex items-center justify-between px-5 py-4 bg-slate-900/40 border-b border-white/5">
                                        <div className="flex items-center gap-2">
                                            <Icon name="ShieldAlert" className="text-orange-500" size={16} />
                                            <h3 className="font-semibold text-slate-200 text-xs">NHẬT KÝ VI PHẠM THỜI GIAN THỰC</h3>
                                        </div>
                                        <span className="text-[10px] text-slate-400 bg-white/5 border border-white/10 px-2 py-0.5 rounded font-mono">
                                            Sự cố: {violations.length}
                                        </span>
                                    </div>
                                    <div className="overflow-y-auto flex-1 max-h-[380px]">
                                        <table className="w-full text-left border-collapse">
                                            <thead>
                                                <tr className="bg-slate-950/20 text-[9px] font-bold text-slate-400 border-b border-white/5 uppercase">
                                                    <th className="px-4 py-3">Thời gian</th>
                                                    <th className="px-4 py-3">Vi phạm</th>
                                                    <th className="px-4 py-3 text-center">Ảnh</th>
                                                    <th className="px-4 py-3">Mức độ</th>
                                                    <th className="px-4 py-3">Trạng thái</th>
                                                    <th className="px-4 py-3 text-right">Xem</th>
                                                </tr>
                                            </thead>
                                            <tbody className="divide-y divide-white/5 text-[11px] text-slate-300 font-medium">
                                                {violations.map((v) => (
                                                    <tr key={v.id} className={`hover:bg-white/[0.01] ${v.status === 'Unresolved' ? 'bg-red-500/[0.01]' : ''}`}>
                                                        <td className="px-4 py-3 font-mono text-slate-400">{formatTime(v.timestamp)}</td>
                                                        <td className="px-4 py-3 font-bold">
                                                            {v.violation_type === 'No Helmet' && 'Chưa đội mũ'}
                                                            {v.violation_type === 'No Vest' && 'Chưa mặc áo'}
                                                            {v.violation_type === 'No Helmet & Vest' && 'Thiếu cả Mũ & Áo'}
                                                        </td>
                                                        <td className="px-4 py-3 text-center">
                                                            <img src={v.image_path} className="w-8 h-5 object-cover rounded border border-white/10 inline-block cursor-pointer hover:scale-105 transition-transform" onClick={() => setSelectedViolation(v)} />
                                                        </td>
                                                        <td className="px-4 py-3">
                                                            <span className={`px-1.5 py-0.2 rounded text-[8px] font-bold ${v.severity === 'High' ? 'bg-red-500/10 text-red-400 border border-red-500/20' : 'bg-amber-500/10 text-amber-400 border border-amber-500/20'}`}>
                                                                {v.severity === 'High' ? 'Nghiêm trọng' : 'Trung bình'}
                                                            </span>
                                                        </td>
                                                        <td className="px-4 py-3 font-semibold">
                                                            <span className={v.status === 'Resolved' ? 'text-emerald-400' : 'text-rose-400 animate-pulse'}>
                                                                {v.status === 'Resolved' ? 'Đã xử lý' : 'Cảnh báo'}
                                                            </span>
                                                        </td>
                                                        <td className="px-4 py-3 text-right">
                                                            <button onClick={() => setSelectedViolation(v)} className="p-1 bg-white/5 hover:bg-white/10 rounded transition-all text-slate-300">
                                                                <Icon name="Eye" size={12} className="text-slate-300" />
                                                            </button>
                                                        </td>
                                                    </tr>
                                                ))}
                                            </tbody>
                                        </table>
                                    </div>
                                </div>
                            </div>
                        </section>
                    </main>

                    {/* Lightbox Modal */}
                    {selectedViolation && (
                        <div className="fixed inset-0 z-50 flex items-center justify-center bg-black/85 backdrop-blur-sm p-4 animate-fade-in">
                            <div className="glass-card max-w-lg w-full border-orange-500/20 overflow-hidden relative shadow-2xl">
                                <div className="flex items-center justify-between px-4 py-3 bg-slate-900 border-b border-white/5">
                                    <h4 className="font-bold text-slate-200 text-xs flex items-center gap-1.5">
                                        <Icon name="AlertTriangle" className="text-red-500" size={14} />
                                        <span>CHI TIẾT VI PHẠM CÔNG TRƯỜNG</span>
                                    </h4>
                                    <button onClick={() => setSelectedViolation(null)} className="p-1 bg-white/5 hover:bg-white/10 rounded text-slate-400 hover:text-white">
                                        <Icon name="X" size={12} className="text-slate-400" />
                                    </button>
                                </div>
                                <div className="grid grid-cols-1 md:grid-cols-2">
                                    <div className="bg-slate-950 p-3 flex items-center justify-center">
                                        <img src={selectedViolation.image_path} className="max-h-[220px] object-contain rounded border border-white/5" />
                                    </div>
                                    <div className="p-4 flex flex-col justify-between bg-slate-900/40 text-xs">
                                        <div className="flex flex-col gap-2.5">
                                            <div>
                                                <span className="text-[9px] text-slate-400 font-bold uppercase">Mã vụ việc</span>
                                                <h5 className="font-mono text-orange-400 font-bold">#SAFE-INC-{selectedViolation.id}</h5>
                                            </div>
                                            <div>
                                                <span className="text-[9px] text-slate-400 font-bold uppercase">Thời gian phát hiện</span>
                                                <p className="text-slate-200">{formatTime(selectedViolation.timestamp)}</p>
                                            </div>
                                            <div>
                                                <span className="text-[9px] text-slate-400 font-bold uppercase">Dạng vi phạm</span>
                                                <p className="font-bold text-slate-200">
                                                    {selectedViolation.violation_type === 'No Helmet' && 'Chưa đội mũ bảo hộ'}
                                                    {selectedViolation.violation_type === 'No Vest' && 'Chưa mặc áo bảo hộ'}
                                                    {selectedViolation.violation_type === 'No Helmet & Vest' && 'Thiếu cả Mũ & Áo bảo hộ'}
                                                </p>
                                            </div>
                                            <div>
                                                <span className="text-[9px] text-slate-400 font-bold uppercase">Mô tả</span>
                                                <p className="text-[10px] text-slate-300 bg-white/5 p-2 rounded leading-normal italic mt-0.5">
                                                    {selectedViolation.notes}
                                                </p>
                                            </div>
                                        </div>
                                        <div className="mt-4 pt-3 border-t border-white/5">
                                            {selectedViolation.status === 'Unresolved' ? (
                                                <div className="flex flex-col gap-1.5">
                                                    <input type="text" value={resolutionNotes} onChange={(e) => setResolutionNotes(e.target.value)} placeholder="Ghi chú khắc phục..." className="bg-black/40 border border-white/10 rounded px-2 py-1 text-slate-200 focus:outline-none text-[11px]" />
                                                    <button onClick={() => handleResolve(selectedViolation.id, resolutionNotes)} className="w-full py-1.5 bg-emerald-500 hover:bg-emerald-600 text-white font-bold rounded text-[11px] transition-all">Xác Nhận Giải Quyết</button>
                                                </div>
                                            ) : (
                                                <div className="p-1.5 bg-emerald-500/10 border border-emerald-500/20 rounded flex items-center gap-1.5 text-emerald-400 font-bold text-[10px]">
                                                    <Icon name="CheckCircle" className="text-emerald-400" size={12} />
                                                    <span>Đã xử lý thành công</span>
                                                </div>
                                            )}
                                        </div>
                                    </div>
                                </div>
                            </div>
                        </div>
                    )}

                    {/* Footer */}
                </div>
            );
        };

        ReactDOM.render(<App />, document.getElementById('root'));
    </script>
</body>
</html>
